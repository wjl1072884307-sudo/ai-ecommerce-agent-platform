services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ai_ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_ecommerce_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: ${APP_NAME:-AI Ecommerce Agent Platform API}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ai_ecommerce}:${POSTGRES_PASSWORD:-ai_ecommerce_password}@postgres:5432/${POSTGRES_DB:-ai_ecommerce}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-10}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-mock-agent}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-15}
      RAG_RETRIEVER: ${RAG_RETRIEVER:-keyword}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://127.0.0.1:8080,http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
